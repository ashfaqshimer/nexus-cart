services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-cart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_cart}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nexus_cart_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_cart}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexus_cart_data:
